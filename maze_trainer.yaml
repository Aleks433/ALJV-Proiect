behaviors:
  MazeAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 4096
      learning_rate: 3.0e-4
      beta: 0.01          # high entropy early to encourage exploration
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 128   # smaller network for static maze
      num_layers: 2
      memory:
        memory_size: 128
        sequence_length: 32
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
        # no curiosity for static maze
    max_steps: 5000000
    time_horizon: 256
    summary_freq: 5000
