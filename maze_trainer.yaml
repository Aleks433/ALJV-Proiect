behaviors:
  MazeAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 4096
      learning_rate: 3.0e-4
      beta: 0.01         # entropy bonus — keeps exploration up
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3         # deeper network for spatial reasoning
      memory_size: 256
      sequence_length: 64
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      curiosity:            # helps explore unseen maze areas
        gamma: 0.99
        encoding_size: 256
        learning_rate: 1.0e-3
        strength: 0.05
    max_steps: 10000000
    time_horizon: 256
    summary_freq: 10000
